name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_URL: postgresql://test:test@localhost:5433/test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5433 -U test >/dev/null 2>&1; then
              echo "Database is ready"
              exit 0
            fi
            echo "Waiting for database... ($i/30)"
            sleep 1
          done
          echo "Database did not become ready"
          exit 1

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push Prisma schema
        run: npx prisma db push --schema tests/prisma/schema.prisma

      - name: Run unit tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration
